apply plugin: 'com.android.application'

// Read Play license key from local.properties (never checked in). An empty
// placeholder lets the build succeed; MainActivity will fail at runtime without
// a real key. Developers: put `licenceKey=<your key>` in local.properties.
def localProps = new Properties()
def localPropsFile = rootProject.file('local.properties')
if (localPropsFile.exists()) {
    localProps.load(new FileInputStream(localPropsFile))
}
def playLicenceKey = localProps.getProperty('licenceKey', '')

dependencies {
    implementation project(':library')
    implementation 'androidx.annotation:annotation:1.3.0'
}

android {
    namespace 'com.anjlab.android.iab.v3.sample2'

    defaultConfig {
        versionCode 6
        versionName '6.0'
        minSdkVersion 23
        targetSdkVersion 34
        compileSdk = 34
        buildToolsVersion = '34.0.0'

        buildConfigField "String", "licenceKey", "\"${playLicenceKey}\""
    }

    // AGP 8.x disables BuildConfig generation by default.
    buildFeatures {
        buildConfig true
    }

    sourceSets.main {
        manifest.srcFile 'AndroidManifest.xml'
        java.srcDir 'src'
        resources.srcDir 'src'
        res.srcDir 'res'
    }

    signingConfigs {
        release
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }

    if (project.hasProperty('keyStoreFile')) {
        android.signingConfigs.release.storeFile = file(keyStoreFile)
    }

    if (project.hasProperty('keyStorePassword')) {
        android.signingConfigs.release.storePassword = keyStorePassword
    }

    if (project.hasProperty('keyStoreKeyAlias')) {
        android.signingConfigs.release.keyAlias = keyStoreKeyAlias
    }

    if (project.hasProperty('keyStoreKeyPassword')) {
        android.signingConfigs.release.keyPassword = keyStoreKeyPassword
    }
}